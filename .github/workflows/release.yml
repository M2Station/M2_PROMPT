name: Release

# Publish Windows installers when a version tag is pushed, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0
# Builds the NSIS installers (x64 + ARM64) with electron-builder and attaches
# them to a GitHub Release created for the tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v6
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (electron-builder NSIS)
        # --publish never: only build locally; the "Publish GitHub Release" step
        # below uploads the artifact. Without this, electron-builder auto-detects
        # the tag and tries to publish itself, failing because GH_TOKEN isn't set.
        run: npm run dist -- --publish never

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem dist -File | Select-Object Name, @{ n = 'MB'; e = { [math]::Round($_.Length / 1MB, 1) } }

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installers = @(Get-ChildItem dist -Filter '*.exe' -File)
          if ($installers.Count -eq 0) { Write-Host "No installer .exe found in dist/"; exit 1 }
          Write-Host "Attaching $($installers.Count) installer(s):"
          $installers | ForEach-Object { Write-Host "  - $($_.Name)" }
          $tag = $env:GITHUB_REF_NAME
          $notes = "Automated Windows installers (x64 + ARM64) for M2_PROMPT $tag.`n`nDownload the installer matching your CPU architecture, run it, and follow the interactive installer."
          gh release create $tag $installers.FullName --title "M2_PROMPT $tag" --notes $notes
