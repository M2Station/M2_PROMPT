      <!-- ===================== PROMPT_OUTPUT view ===================== -->
      <div class="feature-view active" id="view-output">
        <!-- Project tabs: each tab is a whole project (fields + prompt sections) -->
        <nav class="exp-tabs" id="projTabs"></nav>

        <!-- Snippet toolbar: a tools button (manage snippets) + category buttons
             that open floating, draggable panels of quick prompt inserts. -->
        <nav class="snip-bar" id="snipBar">
          <button class="snip-tool" id="btnSnipManage" data-i18n-title="snip.manage.title" title="設定 SNIPPET">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />

            </svg>
          </button>
          <div class="snip-cats" id="snipCats"></div>
        </nav>

        <main class="layout">
          <!-- Left: project fields -->
          <section class="panel panel-form">
            <div class="panel-head">
              <h2 data-i18n="panel.projFields">專案欄位</h2>
              <div class="panel-head-right">
                <span class="hint" data-i18n="panel.projFields.hint">Project Info</span>
                <button type="button" class="btn btn-ghost btn-sm" id="btnResetFields" data-i18n-title="btn.resetFields.title" title="把專案欄位還原成預設值">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10" />
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                  </svg>
                  <span data-i18n="btn.resetFields">還原預設</span>
                </button>
                <button type="button" class="btn btn-ghost btn-sm" id="btnCopySummary" data-i18n-title="btn.copySummary.title" title="把專案欄位以文字格式複製到剪貼簿">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                  <span data-i18n="btn.copySummary">COPY SUMMARY</span>
                </button>
              </div>
            </div>
            <div class="panel-body">
              <div class="field">
                <label for="projectName"><span data-i18n="field.projName">專案名稱</span> <span class="req">*</span> <span class="opt" data-i18n="field.projName.opt">中英文皆可</span></label>
                <input id="projectName" type="text" data-i18n-ph="field.projName.ph" placeholder="e.g. Customer Support Bot" autocomplete="off" />
                <small class="folder-line"><label class="prefix-toggle" data-i18n-title="field.prefix.title" title="勾選才會在資料夾名稱前加上日期與時間"><span data-i18n="field.prefix">PRE_FIX</span><input type="checkbox" id="usePrefix" /></label><span class="prefix-colon">：</span><code id="folderPreview">YYYYMMDD_HHmm_ABBREVIATE</code><button type="button" class="btn-clock" id="btnRefreshTime" data-i18n-title="btn.refreshTime.title" title="更新為目前日期與時間"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><polyline points="12 7 12 12 15 14" /></svg></button></small>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="date" data-i18n="field.date">日期</label>
                  <input id="date" type="date" />
                </div>
                <div class="field">
                  <label for="model" data-i18n="field.model">目標模型</label>
                  <input id="model" type="text" data-i18n-ph="field.model.ph" placeholder="e.g. GPT-4o" autocomplete="off" />
                </div>
              </div>

              <div class="field">
                <label for="notes" data-i18n="field.notes">備註</label>
                <textarea id="notes" rows="3" data-i18n-ph="field.notes.ph" placeholder="備註..."></textarea>
              </div>

              <!-- Custom fields -->
              <div class="field">
                <div class="custom-head">
                  <label><span data-i18n="custom.title">自訂欄位</span> <span class="opt" data-i18n="custom.opt">Custom Fields</span></label>
                  <button type="button" class="btn btn-ghost btn-sm" id="btnAddField" data-i18n="btn.addField">+ 新增欄位</button>
                </div>
                <div id="customFields" class="custom-list"></div>
              </div>

              <div class="field">
                <label for="outputBase"><span data-i18n="field.outputBase">輸出根目錄</span> <span class="opt" data-i18n="field.outputBase.opt">(選填)</span></label>
                <div style="display:flex; gap:8px; align-items:stretch;">
                  <input id="outputBase" type="text" data-i18n-ph="field.outputBase.ph" placeholder="留空 = 專案內 PROMPT_OUTPUT/" autocomplete="off" style="flex:1;" />
                  <button type="button" class="btn btn-ghost btn-sm" id="btnOpenBase" data-i18n-title="btn.openBase.title" title="開啟輸出根目錄">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    <span data-i18n="btn.openBase">開啟</span>
                  </button>
                  <button type="button" class="btn btn-ghost btn-sm" id="btnBrowseBase" data-i18n="btn.browse">Browse...</button>
                </div>
                <small data-i18n="field.outputBase.note">可填絕對路徑，例如 D:\Prompts</small>
              </div>
            </div>
          </section>

          <!-- Draggable splitter -->
          <div class="splitter" id="splitter" data-i18n-title="splitter.title" title="拖曳調整左右寬度"></div>

          <!-- Right: prompt input (dynamic function tabs) -->
          <section class="panel panel-log">
            <div class="panel-head">
              <div class="tabs" id="sectionTabs"></div>
              <div class="log-tools">
                <span class="counter" id="counter">0 行 · 0 字元</span>
                <button class="btn btn-ghost btn-sm btn-font" id="btnFontDown" data-i18n-title="btn.fontDown.title" title="縮小編輯區字體 (Ctrl -)">A-</button>
                <button class="btn btn-ghost btn-sm btn-font" id="btnFontUp" data-i18n-title="btn.fontUp.title" title="放大編輯區字體 (Ctrl +)">A+</button>
                <button class="btn btn-ghost btn-sm" id="btnExportSingle" data-i18n-title="btn.exportSingle.title" title="只輸出目前這個分頁">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                  </svg>
                  <span data-i18n="btn.exportSingle">輸出此分頁</span>
                </button>
                <button class="btn btn-ghost btn-sm" id="btnClearLogs" data-i18n-title="btn.clear.title" data-i18n="btn.clear" title="清空目前分頁">清除</button>
              </div>
            </div>
            <div class="panel-body log-body" id="sectionBody"></div>
          </section>
        </main>

        <!-- Action bar -->
        <footer class="actionbar">
          <div class="action-left">
            <button class="btn btn-ghost btn-sm" id="btnOpenFolder" data-i18n-title="btn.openFolder.title" title="開啟輸出資料夾">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
              </svg>
              <span data-i18n="btn.openFolder">開啟資料夾</span>
            </button>
            <span class="kbd-hint"><span data-i18n="kbd.pre">提示：</span><kbd>Ctrl</kbd> + <kbd>Enter</kbd><span data-i18n="kbd.post"> 快速輸出</span></span>
          </div>
          <div class="action-right">
            <button class="btn btn-ghost" id="btnSave" style="display:none;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              <span data-i18n="btn.save">儲存</span>
            </button>
            <button class="btn btn-primary" id="btnExport">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              <span data-i18n="btn.export">輸出</span>
            </button>
          </div>
        </footer>

        <!-- Result -->
        <section class="result hidden" id="result"></section>
      </div>
      <!-- ===================== /PROMPT_OUTPUT view ===================== -->
    </div>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>

    <!-- Settings modal -->
    <div class="modal-overlay hidden" id="settingsModal">
      <div class="modal">
        <div class="modal-head">
          <h2 data-i18n="settings.title">設定</h2>
          <button class="btn-remove" id="btnSettingsClose" title="Close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="setTheme"><span data-i18n="settings.theme">主題</span> <span class="opt" data-i18n="settings.theme.opt">Theme</span></label>
            <select id="setTheme" class="select-theme"></select>
            <small data-i18n="settings.theme.note">切換整體介面配色主題。</small>
          </div>
          <div class="field">
            <label for="setAbbrevLen"><span data-i18n="settings.folderLen">資料夾名稱長度</span> <span class="opt" data-i18n="settings.folderLen.opt">(1–40)</span></label>
            <input id="setAbbrevLen" type="number" min="1" max="40" step="1" />
            <small data-i18n="settings.folderLen.note">專案名稱縮寫的最大長度。</small>
            <small><span data-i18n="settings.preview">預覽：</span><code id="setPreview"></code></small>
          </div>
          <div class="field">
            <label for="setTypeLen"><span data-i18n="settings.typeLen">分頁名稱長度</span> <span class="opt" data-i18n="settings.typeLen.opt">(1–100)</span></label>
            <input id="setTypeLen" type="number" min="1" max="100" step="1" />
            <small data-i18n="settings.typeLen.note">分頁（檔名／子資料夾）的最大長度。</small>
          </div>
        </div>
      </div>
    </div>

    <!-- SNIPPET manager modal -->
    <div class="modal-overlay hidden" id="snipManagerModal">
      <div class="modal modal-wide">
        <div class="modal-head">
          <h2 data-i18n="snip.manage.title">SNIPPET 設定</h2>
          <button class="btn-remove" id="btnSnipManagerClose" title="Close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label><span data-i18n="snip.manage.category">分類</span></label>
            <div class="snip-cat-row">
              <select id="snipCatSelect"></select>
              <input id="snipCatLabel" type="text" data-i18n-ph="snip.manage.catName" placeholder="分類名稱" autocomplete="off" />
              <button type="button" class="btn btn-ghost btn-sm" id="btnSnipDelCat" data-i18n="snip.manage.delCat">刪除分類</button>
            </div>
            <div class="snip-cat-row">
              <input id="snipNewCat" type="text" data-i18n-ph="snip.manage.newCatPh" placeholder="新分類名稱" autocomplete="off" />
              <button type="button" class="btn btn-ghost btn-sm" id="btnSnipAddCat" data-i18n="snip.manage.addCat">＋ 新增分類</button>
            </div>
          </div>
          <div class="field snip-items-field">
            <label><span data-i18n="snip.manage.items">此分類的片語</span></label>
            <div id="snipItemList" class="snip-edit-list"></div>
          </div>
          <div class="field">
            <label><span data-i18n="snip.manage.add">新增片語（可直接貼上內容）</span></label>
            <input id="snipNewLabel" type="text" data-i18n-ph="snip.manage.labelPh" placeholder="按鈕名稱（留空＝取內容第一行）" autocomplete="off" />
            <textarea id="snipNewText" rows="3" data-i18n-ph="snip.manage.textPh" placeholder="貼上要插入的 Prompt / 關鍵字…" spellcheck="false"></textarea>
            <div class="snip-add-actions">
              <button type="button" class="btn btn-primary btn-sm" id="btnSnipAddItem" data-i18n="snip.manage.addItem">＋ 加入此分類</button>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <span class="snip-dirty" id="snipDirtyFlag" data-i18n="snip.manage.unsaved">未儲存的變更</span>
          <div class="modal-foot-actions">
            <button type="button" class="btn btn-ghost btn-sm" id="btnSnipCancel" data-i18n="snip.manage.cancel">取消</button>
            <button type="button" class="btn btn-primary btn-sm" id="btnSnipSave" data-i18n="snip.manage.save">儲存</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
